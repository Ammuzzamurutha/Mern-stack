<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Hover Effect</title>
    <link rel="stylesheet" href="cardhover.css">
</head>
<body>
    <div class="card">
    <img src="man.jpeg" alt="man">
    <div class="desc">
        <h2>Bhanu Kiran</h2>
        <p>Data Scientist</p>
    </div>
    <div class="card">
        <img src="woman.jpeg" alt="woman">
        <div class="desc">  
            <h2>Amrutha</h2>
            <p>Software Engineer</p>
        </div>
    </div>
</body>
</html>
